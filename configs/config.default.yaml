data_download:
  name: Astana
  latitude: 51.1801
  longitude: 71.446
  start_date: "2020-01-01"
  end_date: "2025-12-31"
  hourly_variables:
    - temperature_2m
    - relative_humidity_2m
    - dew_point_2m
    - cloud_cover
    - wind_speed_10m
  wind_speed_unit: ms
  timezone: auto
  archive_url: https://archive-api.open-meteo.com/v1/archive
  cache_dir: .cache
  cache_expire_after: -1
  retries: 5
  output_path: data/raw/astana_hourly.csv